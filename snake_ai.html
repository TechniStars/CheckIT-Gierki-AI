<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Snake AI</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2c3e50;
            font-family: Arial, sans-serif;
            color: white;
        }
        h1 {
            margin: 20px;
            color: #2ecc71;
        }
        #game-container {
            display: flex;
            gap: 30px;
            align-items: start;
        }
        #gameCanvas {
            border: 4px solid #2ecc71;
            background-color: #34495e;
        }
        #info-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        #score {
            font-size: 28px;
            background-color: #34495e;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        #ai-container {
            background-color: #34495e;
            padding: 20px;
            border-radius: 10px;
        }
        #speed-container {
            background-color: #34495e;
            padding: 20px;
            border-radius: 10px;
        }
        #speedSlider {
            width: 100%;
            margin: 10px 0;
            cursor: pointer;
        }
        #speedValue {
            font-size: 18px;
            color: #2ecc71;
            font-weight: bold;
        }
        #modelUrlInput {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 2px solid #2ecc71;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
        #modelUrlInput:focus {
            outline: none;
            border-color: #27ae60;
        }
        .input-label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #ecf0f1;
        }
        #webcam-container {
            margin-top: 10px;
        }
        #webcam-container canvas {
            border: 2px solid #2ecc71;
            border-radius: 5px;
        }
        #label-container {
            margin-top: 10px;
            font-size: 14px;
        }
        #label-container div {
            padding: 5px;
            margin: 3px 0;
            background-color: #2c3e50;
            border-radius: 5px;
        }
        button {
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #27ae60;
        }
        #controls {
            margin: 10px;
            font-size: 16px;
            color: #ecf0f1;
            text-align: center;
        }
        #gameOver {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            border: 3px solid #e74c3c;
        }
        #gameOver h2 {
            color: #e74c3c;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>🐍 Snake AI</h1>
    <div id="score">Wynik: 0 | Długość: 3</div>
    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="info-panel">
            <div id="speed-container">
                <label class="input-label">Prędkość gry:</label>
                <input 
                    type="range" 
                    id="speedSlider" 
                    min="50" 
                    max="300" 
                    value="150" 
                    step="10"
                >
                <div id="speedValue">Średnia (150ms)</div>
            </div>
            <div id="ai-container">
                <label class="input-label">URL modelu z Teachable Machine:</label>
                <input 
                    type="text" 
                    id="modelUrlInput" 
                    placeholder="https://teachablemachine.withgoogle.com/models/xxxxxx/"
                >
                <button type="button" onclick="initGame()">Uruchom AI</button>
                <div id="webcam-container"></div>
                <div id="label-container"></div>
            </div>
        </div>
    </div>
    <div id="controls">Sterowanie: AI przez kamerę lub strzałki ↑ ↓ ← →</div>
    <div id="gameOver">
        <h2>💀 Koniec gry!</h2>
        <p id="finalScore"></p>
        <button onclick="restartGame()">Zagraj ponownie</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDiv = document.getElementById('score');
        const gameOverDiv = document.getElementById('gameOver');
        const finalScoreP = document.getElementById('finalScore');

        // Konfiguracja AI
        let model, webcam, labelContainer, maxPredictions;

        // Parametry gry
        const GRID_SIZE = 20;
        const TILE_COUNT = canvas.width / GRID_SIZE;
        let GAME_SPEED = 150; // ms

        let snake = [
            {x: 10, y: 10}
        ];
        let direction = {x: 0, y: 0};
        let nextDirection = {x: 0, y: 0};
        let food = {x: 15, y: 15};
        let score = 0;
        let gameActive = false;
        let useAI = false;
        let gameLoop = null;

        // Inicjalizacja AI
        async function initGame() {
            if (useAI) return;

            // Pobierz URL z inputa
            const modelUrlInput = document.getElementById('modelUrlInput');
            let URL = modelUrlInput.value.trim();
            
            // Walidacja URL
            if (!URL) {
                alert('Wpisz URL modelu z Teachable Machine!');
                return;
            }
            
            // Dodaj slash na końcu jeśli go brakuje
            if (!URL.endsWith('/')) {
                URL += '/';
            }

            try {
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";

                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                const flip = true;
                webcam = new tmImage.Webcam(200, 200, flip);
                await webcam.setup();
                await webcam.play();

                document.getElementById("webcam-container").appendChild(webcam.canvas);
                labelContainer = document.getElementById("label-container");
                for (let i = 0; i < maxPredictions; i++) {
                    labelContainer.appendChild(document.createElement("div"));
                }

                useAI = true;
                window.requestAnimationFrame(aiLoop);
                
                if (!gameActive) {
                    startGame();
                }
            } catch (error) {
                console.error("Błąd inicjalizacji AI:", error);
                alert("Błąd ładowania modelu! Sprawdź czy URL jest poprawny.\n\nUżyj strzałek do gry.");
            }
        }

        async function aiLoop() {
            if (!useAI) return;
            webcam.update();
            await predict();
            window.requestAnimationFrame(aiLoop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);

            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction = prediction[i].className + ": " +
                    prediction[i].probability.toFixed(2);
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }

            let maxProb = 0;
            let detectedDirection = null;

            prediction.forEach((p) => {
                if (p.probability > maxProb) {
                    maxProb = p.probability;
                    
                    const className = p.className.toLowerCase();
                    if (className.includes('up') || className.includes('góra')) {
                        detectedDirection = {x: 0, y: -1};
                    } else if (className.includes('down') || className.includes('dół')) {
                        detectedDirection = {x: 0, y: 1};
                    } else if (className.includes('left') || className.includes('lewo')) {
                        detectedDirection = {x: -1, y: 0};
                    } else if (className.includes('right') || className.includes('prawo')) {
                        detectedDirection = {x: 1, y: 0};
                    }
                }
            });

            if (maxProb > 0.7 && detectedDirection) {
                // Nie pozwól zawrócić w przeciwnym kierunku
                if (!(detectedDirection.x === -direction.x && detectedDirection.y === -direction.y)) {
                    nextDirection = detectedDirection;
                }
            }
        }

        // Obsługa slidera prędkości
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');

        speedSlider.addEventListener('input', (e) => {
            GAME_SPEED = parseInt(e.target.value);
            
            let speedLabel = '';
            if (GAME_SPEED <= 80) {
                speedLabel = 'Bardzo szybka';
            } else if (GAME_SPEED <= 120) {
                speedLabel = 'Szybka';
            } else if (GAME_SPEED <= 180) {
                speedLabel = 'Średnia';
            } else if (GAME_SPEED <= 240) {
                speedLabel = 'Wolna';
            } else {
                speedLabel = 'Bardzo wolna';
            }
            
            speedValue.textContent = `${speedLabel} (${GAME_SPEED}ms)`;
            
            // Jeśli gra jest aktywna, restart interval z nową prędkością
            if (gameActive) {
                clearInterval(gameLoop);
                gameLoop = setInterval(update, GAME_SPEED);
            }
        });

        // Obsługa klawiatury
        document.addEventListener('keydown', (e) => {
            if (!gameActive) {
                if (e.key.startsWith('Arrow')) {
                    startGame();
                }
            }

            let newDirection = null;
            
            switch(e.key) {
                case 'ArrowUp':
                    newDirection = {x: 0, y: -1};
                    break;
                case 'ArrowDown':
                    newDirection = {x: 0, y: 1};
                    break;
                case 'ArrowLeft':
                    newDirection = {x: -1, y: 0};
                    break;
                case 'ArrowRight':
                    newDirection = {x: 1, y: 0};
                    break;
            }

            if (newDirection) {
                // Nie pozwól zawrócić w przeciwnym kierunku
                if (!(newDirection.x === -direction.x && newDirection.y === -direction.y)) {
                    nextDirection = newDirection;
                }
            }
        });

        function startGame() {
            if (gameActive) return;
            
            gameActive = true;
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            
            gameLoop = setInterval(update, GAME_SPEED);
        }

        function generateFood() {
            food = {
                x: Math.floor(Math.random() * TILE_COUNT),
                y: Math.floor(Math.random() * TILE_COUNT)
            };

            // Sprawdź czy jedzenie nie jest na wężu
            const onSnake = snake.some(segment => 
                segment.x === food.x && segment.y === food.y
            );
            
            if (onSnake) {
                generateFood();
            }
        }

        function update() {
            if (!gameActive) return;

            // Aktualizuj kierunek
            direction = nextDirection;

            // Nowa głowa
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // Sprawdź kolizję ze ścianami
            if (head.x < 0 || head.x >= TILE_COUNT || 
                head.y < 0 || head.y >= TILE_COUNT) {
                gameOver();
                return;
            }

            // Sprawdź kolizję z własnym ogonem
            const hitSelf = snake.some(segment => 
                segment.x === head.x && segment.y === head.y
            );
            
            if (hitSelf) {
                gameOver();
                return;
            }

            // Dodaj nową głowę
            snake.unshift(head);

            // Sprawdź czy zjedliśmy jedzenie
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                generateFood();
                updateScore();
            } else {
                // Usuń ogon (wąż się porusza)
                snake.pop();
            }

            draw();
        }

        function draw() {
            // Wyczyść canvas
            ctx.fillStyle = '#34495e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Narysuj siatkę (opcjonalnie)
            ctx.strokeStyle = '#2c3e50';
            ctx.lineWidth = 1;
            for (let i = 0; i <= TILE_COUNT; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }

            // Narysuj jedzenie
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // Narysuj węża
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // Głowa
                    ctx.fillStyle = '#2ecc71';
                } else {
                    // Ciało
                    ctx.fillStyle = '#27ae60';
                }
                
                ctx.fillRect(
                    segment.x * GRID_SIZE + 1,
                    segment.y * GRID_SIZE + 1,
                    GRID_SIZE - 2,
                    GRID_SIZE - 2
                );
            });
        }

        function updateScore() {
            scoreDiv.textContent = `Wynik: ${score} | Długość: ${snake.length}`;
        }

        function gameOver() {
            gameActive = false;
            clearInterval(gameLoop);
            
            finalScoreP.textContent = `Wynik: ${score} punktów | Długość węża: ${snake.length}`;
            gameOverDiv.style.display = 'block';

            // Nie zatrzymujemy kamery - niech działa dalej w tle
        }

        function restartGame() {
            // Zatrzymaj starą grę jeśli działa
            if (gameLoop) {
                clearInterval(gameLoop);
            }
            
            snake = [{x: 10, y: 10}];
            direction = {x: 0, y: 0};
            nextDirection = {x: 0, y: 0};
            score = 0;
            gameActive = false;
            
            generateFood();
            updateScore();
            gameOverDiv.style.display = 'none';
            draw();

            // Uruchom nową grę
            startGame();
        }

        // Inicjalizacja gry
        generateFood();
        draw();
        updateScore();
    </script>
</body>
</html>
